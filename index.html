<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NTEC 3D Printing Office - 3DViewerWebApp</title>
    <!-- Favicon and Web App Icon -->
    <link rel="icon" type="image/png" href="./src/images/3DPO_Small_Logo.png" />
    <link rel="apple-touch-icon" href="./src/images/3DPO_Small_Logo.png" />
    <!-- Include Three.js for Raycasting & Math utilities to prevent undefined errors -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
    <script>
      if (window.THREE) {
          if (!window.THREE.Object3D.prototype.onBeforeRender) {
              window.THREE.Object3D.prototype.onBeforeRender = function() {};
          }
          if (!window.THREE.Object3D.prototype.onAfterRender) {
              window.THREE.Object3D.prototype.onAfterRender = function() {};
          }
          if (window.THREE.Material && !window.THREE.Material.prototype.onBeforeRender) {
              window.THREE.Material.prototype.onBeforeRender = function() {};
          }
          if (window.THREE.BufferGeometry && !window.THREE.BufferGeometry.prototype.onBeforeRender) {
              window.THREE.BufferGeometry.prototype.onBeforeRender = function() {};
          }
      }
    </script>
    <!-- Official Online-3D-Viewer Engine -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/online-3d-viewer@latest/build/engine/o3dv.min.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <script>
      // Clear any old dev service workers to prevent caching /src/main.tsx
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
